<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hypergraph Benchmarks{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Ensure bootstrap dark overrides don't leak */
        .btn-close { filter: none; }
    </style>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-project-diagram"></i>
            </div>
            <h4 data-i18n="app_title">HyperBench</h4>
            <small class="text-muted">Hypergraph Benchmark Platform</small>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == '/' }}" href="/">
                    <i class="fas fa-home"></i>
                    <span data-i18n="nav_home">Home</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == '/structural' }}" href="/structural">
                    <i class="fas fa-chart-bar"></i>
                    <span data-i18n="nav_structural">Structural Metrics</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == '/im' }}" href="/im">
                    <i class="fas fa-network-wired"></i>
                    <span data-i18n="nav_im">Influence Maximization</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == '/hgnn' }}" href="/hgnn">
                    <i class="fas fa-brain"></i>
                    <span data-i18n="nav_hgnn">Node Classification</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == '/annotate' }}" href="/annotate">
                    <i class="fas fa-pen-fancy"></i>
                    <span data-i18n="nav_annotate">Annotation</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <div class="lang-switcher">
                <button class="btn btn-sm btn-lang active" data-lang="en">EN</button>
                <button class="btn btn-sm btn-lang" data-lang="zh">中</button>
                <button class="btn btn-sm btn-lang" data-lang="ko">한</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <button class="btn btn-link sidebar-toggle d-md-none" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-right">
                <div class="dataset-indicator" id="currentDataset">
                    <i class="fas fa-database"></i>
                    <span data-i18n="no_dataset">No dataset loaded</span>
                </div>
            </div>
        </header>
        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display:none">
        <div class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p id="loadingText" data-i18n="loading">Processing...</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
